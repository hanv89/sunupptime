name: Graphs CI
on:
  schedule:
    - cron: "*/15 * * * *"
  repository_dispatch:
    types: [graphs]
  workflow_dispatch:
concurrency:
  group: ${{ github.repository }}-${{ github.head_ref || github.ref_name }}-upptime
  cancel-in-progress: false
jobs:
  release:
    name: Generate graphs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          token: ${{ secrets.GH_PAT || github.token }}
          fetch-depth: 0
      - name: Generate graphs
        env:
          GH_PAT: ${{ secrets.GH_PAT || github.token }}
          GITHUB_TOKEN: ${{ secrets.GH_PAT || github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: npx --yes @upptime/graphs@1.2.22 || true
      - name: Commit graphs
        run: |
          git config user.name "Upptime Bot"
          git config user.email "73812536+upptime-bot@users.noreply.github.com"
          git add graphs/
          if git diff --cached --quiet; then
            echo "No graph changes to commit"
          else
            git commit -m "📊 Update response time graphs [skip ci] [upptime]"
            git push origin "HEAD:${{ github.head_ref || github.ref_name }}"
          fi
